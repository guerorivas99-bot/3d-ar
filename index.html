<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraNet MVP - Etiqueta AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Estilo para el botón de interacción UI tradicional fuera de AR */
        .perfil-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            border: none;
            border-radius: 25px;
            font-family: sans-serif;
            font-weight: bold;
            z-index: 999;
            display: none; /* Se activará por código */
        }
    </style>
</head>
<body>

    <button id="action-button" class="perfil-btn" onclick="window.location.href='https://instagram.com'">Ver Perfil Completo</button>

    <a-scene mindar-image="imageTargetSrc: ./marcador.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
            
            <a-plane position="0 0 0" width="1" height="0.6" color="#1a1a2e" material="opacity: 0.9; transparent: true; border: 2px solid #ff007f" rotation="0 0 0"></a-plane>

            <a-text value="@TuUsuario" color="#ffffff" align="center" width="3" position="0 0.15 0.01"></a-text>
            <a-text value="Creador de Contenido\nEscanea para conectar" color="#a0a0a0" align="center" width="1.8" position="0 -0.05 0.01"></a-text>

            <a-gltf model src="./Duck.glb" position="0 0.4 0.1" scale="0.15 0.15 0.15" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-gltf-model>

        </a-entity>
    </a-scene>

    <script>
        // Lógica para mostrar el botón cuando la cámara "ve" el código QR
        const targetEl = document.querySelector('#mytarget');
        const button = document.querySelector('#action-button');

        targetEl.addEventListener("targetFound", event => {
            console.log("¡Marcador encontrado!");
            button.style.display = "block";
        });

        targetEl.addEventListener("targetLost", event => {
            console.log("Marcador perdido");
            button.style.display = "none";
        });
    </script>
</body>
</html>
